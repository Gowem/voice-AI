services:
  - type: web
    name: voice-ai-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ANAM_API_KEY
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
